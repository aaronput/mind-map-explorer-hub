<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Mind Maps · Aaron Puthan</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
:root{
  --bg:#0e1116; --surface:#161b22; --surface-2:#1f2630; --border:#2a323d;
  --text:#e6edf3; --text-dim:#9da7b3; --accent:#76b7b2;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--text);font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,system-ui,sans-serif}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
main{max-width:960px;margin:0 auto;padding:56px 24px 80px 24px}
header{margin-bottom:40px}
header h1{margin:0;font-size:24px;font-weight:600;letter-spacing:-0.3px}
header .tag{color:var(--text-dim);font-size:13.5px;margin-top:6px}
header .updated{color:var(--text-dim);font-size:11.5px;margin-top:14px;letter-spacing:.4px;text-transform:uppercase}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}

.card{
  background:var(--surface);border:1px solid var(--border);border-radius:10px;
  padding:20px 22px 18px 22px;position:relative;overflow:hidden;
  transition:border-color .12s, transform .12s;
}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card .accent-strip{position:absolute;left:0;top:0;bottom:0;width:3px}

.card .name{font-size:16px;font-weight:600;margin:0}
.card .author{color:var(--text-dim);font-size:12px;margin-top:2px}
.card .tagline{font-size:12.5px;color:var(--text);margin-top:12px;font-style:italic;opacity:.85}
.card .beat{font-size:11.5px;color:var(--text-dim);margin-top:4px}

.card .stats{display:flex;gap:20px;margin-top:16px;padding-top:14px;border-top:1px solid var(--border)}
.card .stat .num{font-size:16px;font-weight:600}
.card .stat .lbl{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-top:1px}

.card .actions{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
.card .actions .open{font-size:13px;font-weight:600}
.card .actions .meta{font-size:10.5px;color:var(--text-dim);display:flex;gap:10px}
.card .actions .meta a{color:var(--text-dim)}
.card .actions .meta a:hover{color:var(--text)}

.card.placeholder{border-style:dashed;opacity:.55}
.card.placeholder .name{color:var(--text-dim)}
.card.placeholder:hover{transform:none;border-color:var(--border)}

footer{margin-top:56px;padding-top:20px;border-top:1px solid var(--border);color:var(--text-dim);font-size:11.5px;display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap}
footer a{color:var(--text-dim)}
footer a:hover{color:var(--text)}
</style>
</head>
<body>
<main>
  <header>
    <h1>Mind Maps</h1>
    <div class="tag">Force-directed graphs over Substack archives, plus curated knowledge bases.</div>
    <div class="updated" id="updated">…</div>
  </header>

  <div class="grid" id="grid"></div>

  <footer>
    <span>Aaron Puthan · <a href="https://github.com/aaronput" target="_blank" rel="noopener">github.com/aaronput</a></span>
    <span>Refreshed weekly · Vercel-hosted</span>
  </footer>
</main>

<script id="manifest" type="application/json">{

  "mindmaps": [

    {

<script>
const manifest = JSON.parse(document.getElementById("manifest").textContent);
document.getElementById("updated").textContent = "Last synced " + manifest.updated;

const grid = document.getElementById("grid");
function sourceLine(m){
  if(!m.source) return `${m.author} · <span style="opacity:.7">${m.kind==="knowledge_base"?"knowledge base":"static"}</span>`;
  const host = m.source.replace(/^https?:\/\//,'').replace(/\/$/,'');
  return `${m.author} · <a href="${m.source}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${host}</a>`;
}

function statsHtml(m){
  if(m.kind === "knowledge_base"){
    return `
      <div class="stat"><div class="num">${(m.node_count||0).toLocaleString()}</div><div class="lbl">Nodes</div></div>
      <div class="stat"><div class="num" style="font-size:12.5px;color:var(--text-dim);font-weight:400;padding-top:3px">Curated</div><div class="lbl">Format</div></div>
      <div class="stat"><div class="num" style="font-size:12.5px;color:var(--text-dim);font-weight:400;padding-top:3px">${m.refreshed_at||"—"}</div><div class="lbl">Updated</div></div>
    `;
  }
  return `
    <div class="stat"><div class="num">${(m.post_count||0).toLocaleString()}</div><div class="lbl">Posts</div></div>
    <div class="stat"><div class="num">${m.concept_count||0}</div><div class="lbl">Concepts</div></div>
    <div class="stat"><div class="num" style="font-size:12.5px;color:var(--text-dim);font-weight:400;padding-top:3px">${m.refreshed_at||"—"}</div><div class="lbl">Refreshed</div></div>
  `;
}

manifest.mindmaps.forEach(m=>{
  const card = document.createElement("a");
  card.className = "card" + (m.kind==="knowledge_base"?" kb":"");
  card.href = m.url;
  card.target = "_blank";
  card.rel = "noopener";
  const openLabel = m.kind==="knowledge_base" ? "Open knowledge base" : "Open mind map";
  card.innerHTML = `
    <div class="accent-strip" style="background:${m.accent}"></div>
    <h2 class="name">${m.name}</h2>
    <div class="author">${sourceLine(m)}</div>
    <div class="tagline">${m.tagline}</div>
    <div class="beat">${m.beat}</div>
    <div class="stats">${statsHtml(m)}</div>
    <div class="actions">
      <div class="open" style="color:${m.accent}">${openLabel} &rarr;</div>
      <div class="meta">
        <a href="${m.repo}" target="_blank" rel="noopener" onclick="event.stopPropagation()">repo</a>
      </div>
    </div>
  `;
  grid.appendChild(card);
});

// Placeholder card for future maps
const p = document.createElement("div");
p.className = "card placeholder";
p.innerHTML = `
  <h2 class="name">+ Add a mind map</h2>
  <div class="author">Substack archive → force graph</div>
  <div class="tagline">Currently added by hand from the MindMapExplorer template.</div>
  <div class="beat">Future: <code>./new_mindmap.sh &lt;substack-url&gt;</code></div>
  <div class="stats"><div class="stat"><div class="num">—</div><div class="lbl">Coming</div></div></div>
`;
grid.appendChild(p);
</script>
</body>
</html>
